                    <div className="max-w-3xl w-full">
                        <div className="mb-12 text-center"><h2 className="text-2xl font-light mb-1" style={{ fontFamily: FONTS.serifEn }}>Our Story</h2><div className="w-[1px] h-8 bg-[#1A1A1A]/20 mx-auto"></div></div>
                        <div ref={ref} className="relative space-y-0">
                            <motion.div initial={{ height: 0 }} animate={isInView ? { height: '100%' } : { height: 0 }} transition={{ duration: 2, ease: "easeInOut" }} className="absolute left-[3.5rem] md:left-[5rem] top-2 w-[1px] bg-[#1A1A1A]/10" />
                            {HISTORY.map((item, index) => (
                                <motion.div key={index} initial={{ opacity: 0, y: 10 }} animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 10 }} transition={{ delay: index * 0.15, duration: 0.6 }} className="flex items-start group py-3">
                                    <div className="w-[3.5rem] md:w-[5rem] shrink-0 text-right pr-4 md:pr-6 relative"><span className="text-[10px] md:text-[11px] font-bold tracking-widest opacity-40 font-sans block pt-1">{item.year.replace('年', '')}</span><span className="absolute right-[-3px] top-[9px] w-[5px] h-[5px] rounded-full bg-[#1A1A1A] opacity-0 group-hover:opacity-100 transition-opacity" /></div>

                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const CompanySection = () => {
            const info = [
                { label: "会社名", value: "緑川木材株式会社" },
                { label: "代表者", value: "緑川 新之介" },
                { label: "所在地", value: "〒078-1403 北海道上川郡愛別町字南町472番地4" },
                { label: "事業内容", value: "木材加工、建材製造、家具販売" },
            ];
            return (
                <section id="company" className="py-24 px-6 md:px-20 bg-[#F5F5F0] text-[#1A1A1A]">

                        <div className="md:w-1/3 space-y-8">
                            <div><h2 className="text-3xl font-light mb-2" style={{ fontFamily: FONTS.serifEn }}>Company</h2><div className="flex items-center gap-1 opacity-50"><MapPin size={14} /> Aibetsu, Hokkaido</div></div>
                            <div className="space-y-4">
                                <a href="https://maps.app.goo.gl/CWtvKeSF25LfbMxD8?g_st=ic" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 border border-[#1A1A1A]/20 px-6 py-4 hover:bg-[#1A1A1A] hover:text-white transition-all group w-full cursor-pointer relative z-30 pointer-events-auto"><Map size={16} /><span className="text-xs tracking-widest flex-1" style={{ fontFamily: FONTS.sans }}>GOOGLE MAPS</span><ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" /></a>
                                <a href="mailto:midorikawamokuzai@gmail.com" className="flex items-center gap-3 border border-[#1A1A1A]/20 px-6 py-4 hover:bg-[#1A1A1A] hover:text-white transition-all group w-full cursor-pointer relative z-30 pointer-events-auto"><Mail size={16} /><span className="text-xs tracking-widest flex-1" style={{ fontFamily: FONTS.sans }}>CONTACT US</span><ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" /></a>
                                <a href="https://www.instagram.com/midorikawamokuzai?igsh=MTdqc2E0ajh3bTJvcw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 border border-[#1A1A1A]/20 px-6 py-4 hover:bg-[#1A1A1A] hover:text-white transition-all group w-full cursor-pointer relative z-30 pointer-events-auto"><Instagram size={16} /><span className="text-xs tracking-widest flex-1" style={{ fontFamily: FONTS.sans }}>INSTAGRAM</span><ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" /></a>
                            </div>
                        </div>
                        <div className="md:w-2/3 w-full grid grid-cols-1 gap-8">
                            <div className="space-y-6">{info.map((item, i) => (<div key={i} className="flex flex-col md:flex-row md:items-baseline border-b border-[#1A1A1A]/10 pb-3"><span className="text-[10px] font-bold tracking-widest opacity-40 w-32 mb-1 md:mb-0" style={{ fontFamily: FONTS.sans }}>{item.label}</span><span className="font-light text-sm md:text-base leading-relaxed" style={{ fontFamily: FONTS.serifJp }}>{item.value}</span></div>))}</div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-[#1A1A1A]/5">
                                <div className="flex flex-col"><span className="text-[10px] font-bold tracking-widest opacity-40 mb-2" style={{ fontFamily: FONTS.sans }}>PHONE</span><a href="tel:0165865855" className="flex items-center gap-2 text-lg font-light hover:opacity-60 transition-opacity cursor-pointer relative z-30 pointer-events-auto"><Phone size={16} className="opacity-50" /> 01658-6-5855</a></div>
                                <div className="flex flex-col"><span className="text-[10px] font-bold tracking-widest opacity-40 mb-2" style={{ fontFamily: FONTS.sans }}>FAX</span><div className="flex items-center gap-2 text-lg font-light"><Printer size={16} className="opacity-50" /> 01658-6-4388</div></div>
                            </div>

        const FloatingNav = () => {
            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            return (
                <div className="fixed bottom-8 right-8 z-50 flex flex-col gap-2 pointer-events-auto mix-blend-difference text-[#E0DCD1]">

        const App = () => (

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
