                <div className="md:w-2/3 w-full grid grid-cols-1 gap-8">
                    <div className="space-y-6">{info.map((item,i)=>(<div key={i} className="flex flex-col md:flex-row md:items-baseline border-b border-[#1A1A1A]/10 pb-3"><span className="text-[10px] font-bold tracking-widest opacity-40 w-32 mb-1 md:mb-0" style={{fontFamily:F.sans}}>{item.label}</span><span className="font-light text-sm md:text-base" style={{fontFamily:ff}}>{item.value}</span></div>))}</div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-[#1A1A1A]/5"><div className="flex flex-col"><span className="text-[10px] font-bold tracking-widest opacity-40 mb-2" style={{fontFamily:F.sans}}>PHONE</span><a href="tel:0165865855" className="flex items-center gap-2 text-lg font-light hover:opacity-60 transition-opacity"><Phone size={16} className="opacity-50"/> 01658-6-5855</a></div><div className="flex flex-col"><span className="text-[10px] font-bold tracking-widest opacity-40 mb-2" style={{fontFamily:F.sans}}>FAX</span><div className="flex items-center gap-2 text-lg font-light"><Printer size={16} className="opacity-50"/> 01658-6-4388</div></div></div>
                </div>
            </div></section>)};

        const Footer=()=>(<footer id="contact" className="bg-[#1A1A1A] text-[#E0DCD1] py-12 px-6"><div className="max-w-7xl mx-auto flex justify-between items-center"><div><h2 className="text-2xl font-medium mb-1" style={{fontFamily:F.serifEn}}>Midorikawa Mokuzai</h2><p className="opacity-40 text-[10px] tracking-widest uppercase" style={{fontFamily:F.sans}}>Hokkaido, Japan</p></div><div className="text-[10px] opacity-20" style={{fontFamily:F.sans}}>&copy; 2026 MIDORIKAWA MOKUZAI</div></div></footer>);

        const FloatingNav=()=>{const st=()=>window.scrollTo({top:0,behavior:'smooth'});const sb=()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});return(<div className="fixed bottom-8 right-8 z-50 flex flex-col gap-2 mix-blend-difference text-[#E0DCD1]"><motion.button initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} transition={{delay:2}} onClick={st} className="w-10 h-10 border border-[#E0DCD1]/50 rounded-full flex items-center justify-center hover:bg-[#E0DCD1] hover:text-[#1A1A1A] transition-colors duration-300"><ArrowUp size={16}/></motion.button><motion.button initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} transition={{delay:2.1}} onClick={sb} className="w-10 h-10 border border-[#E0DCD1]/50 rounded-full flex items-center justify-center hover:bg-[#E0DCD1] hover:text-[#1A1A1A] transition-colors duration-300"><ArrowDown size={16}/></motion.button></div>)};

        const App=()=>{const[lang,setLang]=useState('jp');return(<LangContext.Provider value={lang}><LangToggle lang={lang} setLang={setLang}/><Navigation/><main><HeroSection/><ConceptSection/><ValuesSection/><WoodTypesSection/><ProductsSection/><AwardsSection/><PartnerSection/><HistorySection/><CompanySection/></main><Footer/><FloatingNav/></LangContext.Provider>)};

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
